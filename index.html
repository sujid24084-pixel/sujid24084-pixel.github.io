<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>AI 홈페이지</title>
<style>
body{
    font-family: Arial;
    max-width:700px;
    margin:40px auto;
}
textarea{
    width:100%;
    height:120px;
}
button{
    padding:10px 20px;
    font-size:18px;
}
#answer{
    margin-top:20px;
    white-space:pre-wrap;
}
</style>
</head>
<body>

<h1>🤖 AI 챗봇</h1>

<textarea id="question" placeholder="질문을 입력하세요"></textarea><br><br>

<button onclick="askAI()">질문하기</button>

<div id="answer"></div>

<script>
async function askAI(){
    document.getElementById("answer").innerText =
        "아직 서버가 연결되지 않았습니다.";
}
</script>

</body>
</html>
